version: "3.9"
services:
  pg-primary:
    image: postgres:17.5
    container_name: pg-primary
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: 123456
    ports:
      - "5455:5432"  # 主库映射外部端口 5455
    volumes:
      - ./primary_data:/var/lib/postgresql/data
      - ./init-scripts/init-replica-user.sh:/docker-entrypoint-initdb.d/init-replica-user.sh
    command: >
      postgres -c listen_addresses='*' 
               -c wal_level=replica 
               -c max_wal_senders=10 
               -c wal_keep_size=16MB 
               -c hot_standby=on
    networks:
      - mynetwork

  pg-replica:
    image: postgres:17.5
    container_name: pg-replica
    user: postgres                 
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: 123456
    depends_on:
      - pg-primary
    ports:
      - "5456:5432"  # 从库映射外部端口 5456
    volumes:
      - ./replica_data:/var/lib/postgresql/data
      - ./init-scripts/init-replica.sh:/docker-entrypoint-init-replica.sh
    entrypoint: ["/bin/bash", "/docker-entrypoint-init-replica.sh"]
    networks:
      - mynetwork

networks:
  mynetwork:
    external: true