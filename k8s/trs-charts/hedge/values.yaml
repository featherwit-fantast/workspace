# Hedge 后端服务配置
namespace: onederiv-test
replicaCount: 1

# 镜像配置
image:
  repository: devops-docker-bkrepo.glmszq.com/w283fd/docker-local
  name: hedge
  tag: "1.1"
  pullPolicy: IfNotPresent

# 镜像拉取凭证
imagePullSecrets:
  - name: docker-repo-token

# 服务配置
service:
  name: hedge
  port: 20000
  type: ClusterIP
  annotations:
    monitor.glmszq.com/monitor: 'true'
    monitor.glmszq.com/path: /actuator/prometheus
    monitor.glmszq.com/port: '20000'

# 健康检查配置
healthCheck:
  livenessProbe:
    httpGet:
      path: /actuator/health/liveness
      port: 20000
    initialDelaySeconds: 60
    periodSeconds: 10
  readinessProbe:
    httpGet:
      path: /actuator/health/readiness
      port: 20000
    initialDelaySeconds: 30
    periodSeconds: 5
  startupProbe:
    httpGet:
      path: /actuator/health/liveness
      port: 20000
    initialDelaySeconds: 10
    periodSeconds: 5
    failureThreshold: 30

# 资源限制
resources:
  requests:
    cpu: "500m"
    memory: "1Gi"
  limits:
    cpu: "2000m"
    memory: "2Gi"

# 环境变量
env:
  timezone: "Asia/Shanghai"
  javaOpts: "-Xms1024m -Xmx2048m"

# Volume挂载配置
volumes:
  config:
    mountPath: "/app/config"
    readOnly: true
  log:
    mountPath: "/app/app-log"
  appDocs:
    enabled: true
    mountPath: "/app/App_Docs"
    pvcName: "onederiv-data"
    subPath: "trs/App_Docs"

# 数据库配置
db:
  mysql:
    host: 172.28.30.52
    port: 2883
    username: onederiv@OneDeriv#wx_dtpp_test
    password: Onederiv@2026
    databases:
      bond_oms: bond_oms
      yltrs_admin: yltrs_admin
      yltrs_client: yltrs_client
      yltrs_ylcms: yltrs_ylcms
    driver: com.mysql.cj.jdbc.Driver

# Kafka配置
