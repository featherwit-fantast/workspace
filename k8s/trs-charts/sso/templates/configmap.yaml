data:
  application-dev.yml: |
    spring:
      datasource:
        dynamic:
          primary: trs #设置默认的数据源,默认值为trs
          datasource:
            trs: #数据源：bond_oms
              url: jdbc:mysql://{{ .Values.db.mysql.host }}:{{ .Values.db.mysql.port }}/bond_oms?autoReconnect=true&useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=CONVERT_TO_NULL&useSSL=false&useLegacyDatetimeCode=false&serverTimezone=Asia/Shanghai&nullCatalogMeansCurrent=true&rewriteBatchedStatements=true
              username: {{ .Values.db.mysql.username | quote }}
              password: {{ .Values.db.mysql.password | quote }}
              driver-class-name: {{ .Values.db.mysql.driver }}
            admin: #数据源：yltrs_admin
              url: jdbc:mysql://{{ .Values.db.mysql.host }}:{{ .Values.db.mysql.port }}/yltrs_admin?autoReconnect=true&useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=CONVERT_TO_NULL&useSSL=false&useLegacyDatetimeCode=false&serverTimezone=Asia/Shanghai&nullCatalogMeansCurrent=true&rewriteBatchedStatements=true
              username: {{ .Values.db.mysql.username | quote }}
              password: {{ .Values.db.mysql.password | quote }}
              driver-class-name: {{ .Values.db.mysql.driver }}
            client: #数据源：yltrs_client
              url: jdbc:mysql://{{ .Values.db.mysql.host }}:{{ .Values.db.mysql.port }}/yltrs_client?autoReconnect=true&useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=CONVERT_TO_NULL&useSSL=false&useLegacyDatetimeCode=false&serverTimezone=Asia/Shanghai&nullCatalogMeansCurrent=true&rewriteBatchedStatements=true
              username: {{ .Values.db.mysql.username | quote }}
              password: {{ .Values.db.mysql.password | quote }}
              driver-class-name: {{ .Values.db.mysql.driver }}
            ylcms: #数据源：yltrs_ylcms
              url: jdbc:mysql://{{ .Values.db.mysql.host }}:{{ .Values.db.mysql.port }}/yltrs_ylcms?autoReconnect=true&useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=CONVERT_TO_NULL&useSSL=false&useLegacyDatetimeCode=false&serverTimezone=Asia/Shanghai&nullCatalogMeansCurrent=true&rewriteBatchedStatements=true
              username: {{ .Values.db.mysql.username | quote }}
              password: {{ .Values.db.mysql.password | quote }}
              driver-class-name: {{ .Values.db.mysql.driver }}
          druid:
            #初始化时建立物理连接的个数
            initialSize: 1
            #池中最大连接数
            maxActive: 20
            #最小空闲连接
            minIdle: 1
            #获取连接时最大等待时间，单位毫秒
            maxWait: 60000
      redis:
        host: {{ .Values.redis.host }}
        port: {{ .Values.redis.port }}
        password: {{ .Values.redis.password }}
        timeout: {{ .Values.redis.timeout }}
        database: {{ .Values.redis.database }}
        jedis:
          pool:
            max-active: {{ index .Values.redis.jedis.pool "max-active" }}
            max-idle: {{ index .Values.redis.jedis.pool "max-idle" }}
            max-wait: {{ index .Values.redis.jedis.pool "max-wait" }}

      kafka:
        bootstrap-servers: {{ .Values.kafka.bootstrapServers | quote }}
        producer: # 生产者
          retries: 3 # 设置大于0的值，则客户端会将发送失败的记录重新发送
          batch-size: 131072
          buffer-memory: 67108864
          acks: 1  # acks=0，生产者在成功写入消息之前不会等待任何来自服务器的响应.
          # acks=1,只要集群的leader分区副本接收到了消息，就会向生产者发送一个成功响应的ack.
          # acks=all, 所有参与复制的节点(ISR列表的副本)全部收到消息时，生产者才会接收到来自服务器的响应
          # 此时如果ISR同步副本的个数小于min.insync.replicas的值，消息不会被写入.
          # 指定消息key和消息体的编解码方式
          key-serializer: org.apache.kafka.common.serialization.StringSerializer
          value-serializer: org.apache.kafka.common.serialization.StringSerializer
        consumer:
          group-id: default-group
          enable-auto-commit: false
          auto-offset-reset: latest #earliest 当各分区下有已提交的offset时，从提交的offset开始消费；无提交的offset时，从头开始消费
          #默认值为 latest 当各分区下有已提交的offset时，从提交的offset开始消费；无提交的offset时，消费新产生的该分区下的数据
          key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
          value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
        listener:
          # 当每一条记录被消费者监听器（ListenerConsumer）处理之后提交
          # RECORD
          # 当每一批poll()的数据被消费者监听器（ListenerConsumer）处理之后提交
          # BATCH
          # 当每一批poll()的数据被消费者监听器（ListenerConsumer）处理之后，距离上次提交时间大于TIME时提交
          # TIME
          # 当每一批poll()的数据被消费者监听器（ListenerConsumer）处理之后，被处理record数量大于等于COUNT时提交
          # COUNT
          # TIME |　COUNT　有一个条件满足时提交
          # COUNT_TIME
          # 当每一批poll()的数据被消费者监听器（ListenerConsumer）处理之后, 手动调用Acknowledgment.acknowledge()后提交
          # MANUAL
          # 手动调用Acknowledgment.acknowledge()后立即提交，一般使用这种
          # MANUAL_IMMEDIATE
          ack-mode: manual_immediate

      mail:
        host: smtp.163.com #服务器地址
