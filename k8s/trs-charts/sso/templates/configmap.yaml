  application.yml: |
    #服务配置
    server:
      port: 20000
      max-http-header-size: 10240

    #spring相关配置
    spring:
      application:
        name: sso
      mvc:
        pathmatch:
          matching-strategy: ant_path_matcher
      profiles:
        active: dev
      servlet:
        multipart:
          max-request-size: 100MB
          max-file-size: 100MB
      jackson:
        time-zone: Asia/Shanghai
        date-format: yyyy-MM-dd HH:mm:ss.SSS
        locale: zh_CN
        serialization:
          # 格式化输出
          indent_output: false
      main:
        allow-bean-definition-overriding: true
      datasource:
        druid:
          stat-view-servlet:
            login-username: admin
            login-password: admin

    management:
      endpoints:
        web:
          exposure:
            include: health,prometheus
      endpoint:
        health:
          show-details: always
          probes:
            enabled: true
        prometheus:
          enabled: true
      metrics:
        tags:
          application: ${spring.application.name}


    #mybaits相关配置
    mybatis-plus:
      mapper-locations: classpath*:com/yieldchain/**/mapping/*.xml, classpath:/META-INF/modeler-mybatis-mappings/*.xml
      configuration:
        map-underscore-to-camel-case: true
        cache-enabled: true
        lazy-loading-enabled: true
        multiple-result-sets-enabled: true
        #    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
        log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
      global-config:
        banner: false
        db-config:
          id-type: assign_id
          table-underline: true
        enable-sql-runner: true
      configuration-properties:
        prefix:
        #如果数据库为postgresql，则需要配置为blobType: BINARY
        blobType: BLOB
        #如果数据库为oracle或mssql，则需要配置为boolValue: 1
        boolValue: true
      type-enums-package: com.yieldchain.modular.agrmt.enums

    #验证码相关配置 去除日志打印
    logging:
      level:
        com.anji: off
        springfox: warn
    #验证码相关配置
    aj:
      captcha:
        cache-type: local #分布式部署需要 自己实现CaptchaCacheService 使用redis需要配置redis相关配置
        type: default #验证码类型 clickword 为点选   blockPuzzle 为滑块验证码   default 两种都实例化
        font-type: 宋体
        water-mark: ""
        req-frequency-limit-enable: true #接口请求次数一分钟限制是否开启 true|false
        req-get-lock-limit: 20  # 验证失败2次，get接口锁定
        req-get-lock-seconds: 10 # 验证失败后，锁定时间间隔,s
        req-get-minute-limit: 30 # get接口一分钟内请求数限制
        req-check-minute-limit: 60 # check接口一分钟内请求数限制
        req-verify-minute-limit: 60 # verify接口一分钟内请求数限制
        interference-options: 1 # 滑动干扰项(0/1/2)

    druid:
      loginUsername: admin
      loginPassword: admin
    #  保证金算法规则-SPEL表达式 后续考虑落库现阶段暂且先放这里
    calculation:
      rules:
        long: "priceRange > 0.98 ? initialMargin :  (priceRange <= 0.98 && priceRange > 0.96) ? initialMargin + 0.02 * openingNetPrice : (priceRange > 0.94 && priceRange <= 0.96) ?  initialMargin + 0.04 * openingNetPrice : initialMargin + 0.06 * openingNetPrice"
        short: "priceRange > 1.08 ? initialMargin + 0.06 * openingNetPrice : (priceRange > 1.06 && priceRange <= 1.08) ? initialMargin + 0.03 * openingNetPrice : (priceRange > 1.04 && priceRange <= 1.06) ? initialMargin + 0.05 * openingNetPrice :(priceRange > 1.02 && priceRange <= 1.04) ? initialMargin + 0.05 * openingNetPrice : initialMargin"
