# OTC Backend 服务 - 生产环境配置
namespace: onederiv
replicaCount: 1

# 镜像配置
image:
  repository: devops-docker-bkrepo.glmszq.com/w283fd/docker-local
  name: otc
  tag: "1.1"
  pullPolicy: IfNotPresent

# 镜像拉取凭证
imagePullSecrets:
  - name: docker-repo-token

# 服务配置
service:
  name: otc
  port: 20000
  type: ClusterIP

# 健康检查配置
healthCheck:
  startupProbe:
    tcpSocket:
      port: 20000
    initialDelaySeconds: 10
    periodSeconds: 5
    failureThreshold: 30

# 资源限制
resources:
  requests:
    cpu: "1000m"
    memory: "2Gi"
  limits:
    cpu: "4000m"
    memory: "4Gi"

# 环境变量
env:
  timezone: "Asia/Shanghai"
  javaOpts: "-Xms2048m -Xmx4096m -XX:+UseG1GC -XX:MaxGCPauseMillis=200"

# Volume挂载配置
volumes:
  config:
    mountPath: "/app/config"
    readOnly: false
  log:
    mountPath: "/app/log"
  appDocs:
    enabled: true
    mountPath: "/app/App_Docs"
    pvcName: "onederiv-data"
    subPath: "trs/App_Docs"

# PVC配置
pvc:
  name: "onederiv-data"
  volumeName: "onederiv-data-pv"
  storage: "10Gi"
  accessModes:
    - ReadWriteMany

# 生产环境数据库配置
