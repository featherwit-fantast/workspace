# OTC Backend 服务配置
namespace: onederiv-test
replicaCount: 1

# 镜像配置
image:
  repository: devops-docker-bkrepo.glmszq.com/w283fd/docker-local
  name: otc
  tag: "1.1"
  pullPolicy: IfNotPresent

# 镜像拉取凭证
imagePullSecrets:
  - name: docker-repo-token

# 服务配置
service:
  name: otc
  port: 20000
  type: ClusterIP

# 健康检查配置
healthCheck:
  startupProbe:
    tcpSocket:
      port: 20000
    initialDelaySeconds: 10
    periodSeconds: 5
    failureThreshold: 30

# 资源限制
resources:
  requests:
    cpu: "500m"
    memory: "1Gi"
  limits:
    cpu: "2000m"
    memory: "2Gi"

# 环境变量
env:
  timezone: "Asia/Shanghai"
  javaOpts: "-Xms1024m -Xmx2048m"

# Volume挂载配置
volumes:
  config:
    mountPath: "/app/config"
    readOnly: false
  log:
    mountPath: "/app/log"
  appDocs:
    enabled: true
    mountPath: "/app/App_Docs"
    pvcName: "onederiv-data"
    subPath: "trs/App_Docs"

# PVC配置
pvc:
  name: "onederiv-data"
  volumeName: "onederiv-test-data-pv"
  storage: "10Gi"
  accessModes:
    - ReadWriteMany

# 数据库配置
db:
  mysql:
    host: 172.28.30.52
    port: 2883
    username: onederiv@OneDeriv#wx_dtpp_test
    password: Onederiv@2026
    databases:
      bond_oms: bond_oms
      yltrs_admin: yltrs_admin
      yltrs_client: yltrs_client
      yltrs_ylcms: yltrs_ylcms
    driver: com.mysql.cj.jdbc.Driver

# Kafka配置
