# Calc 计算服务配置
namespace: onederiv-test
replicaCount: 1

# 镜像配置
image:
  repository: devops-docker-bkrepo.glmszq.com/w283fd/docker-local
  name: calc
  tag: "1.1"
  pullPolicy: IfNotPresent

# 镜像拉取凭证
imagePullSecrets:
  - name: docker-repo-token

# 服务配置
service:
  name: calc
  port: 20000
  type: ClusterIP
  annotations:
    monitor.glmszq.com/monitor: 'true'
    monitor.glmszq.com/path: /actuator/prometheus
    monitor.glmszq.com/port: '20000'

# 健康检查配置
healthCheck:
  livenessProbe:
    httpGet:
      path: /actuator/health/liveness
      port: 20000
    initialDelaySeconds: 60
    periodSeconds: 10
  readinessProbe:
    httpGet:
      path: /actuator/health/readiness
      port: 20000
    initialDelaySeconds: 30
    periodSeconds: 5
  startupProbe:
    httpGet:
      path: /actuator/health/liveness
      port: 20000
    initialDelaySeconds: 10
    periodSeconds: 5
    failureThreshold: 30

# 资源限制
resources:
  requests:
    cpu: "500m"
    memory: "1Gi"
  limits:
    cpu: "2000m"
    memory: "2Gi"

# 环境变量
env:
  timezone: "Asia/Shanghai"
  javaOpts: "-Xms1024m -Xmx2048m"

# Volume挂载配置
volumes:
  config:
    mountPath: "/app/config"
    readOnly: true
  log:
    mountPath: "/app/app-log"
  appDocs:
    enabled: false

# 数据库配置
db:
  mysql:
    host: 172.28.30.52
    port: 2883
    username: onederiv@OneDeriv#wx_dtpp_test
    password: Onederiv@2026
    databases:
      bond_oms: bond_oms
      yltrs_admin: yltrs_admin
      yltrs_client: yltrs_client
      yltrs_ylcms: yltrs_ylcms
    driver: com.mysql.cj.jdbc.Driver

# Kafka配置
kafka:
  bootstrapServers: "172.28.112.55:9092,172.28.112.57:9092,172.28.112.58:9092"

# Redis配置
redis:
  host: 172.28.112.246
  port: 6379
  password: GLms@527
  timeout: 5000
  database: 0
  jedis:
    pool:
      max-active: 16
      max-idle: 8
      max-wait: 10000
  redisson:
    config:
      singleServerConfig:
        address: "redis://172.28.112.246:6379"
        password: GLms@527
        connectionPoolSize: 64
        connectionMinimumIdleSize: 24
        idleConnectionTimeout: 10000
        connectTimeout: 10000
        timeout: 3000
